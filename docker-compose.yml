services:
  asistente:
    build: .
    image: asistente-citas
    container_name: asistente-citas
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
    volumes:
      - ./sessions.json:/app/sessions.json
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    stdin_open: true
    tty: true
